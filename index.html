<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Phraimz Concepts | Spatial 3D</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

html,body{
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:'Inter',sans-serif;
  color:#fff;
}

/* ===== LOADER ===== */
.loader{
  position:fixed;inset:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
  transition:.8s;
}
.loader.hidden{opacity:0;visibility:hidden}
.bar{width:240px;height:2px;background:rgba(255,255,255,.15);margin-top:20px}
.fill{height:100%;width:0%;background:#fff}

/* ===== TOUR LOADER ===== */
.tour-loader{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.92);
  backdrop-filter:blur(20px);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10000;
  opacity:0;
  visibility:hidden;
  transition:.5s ease;
}
.tour-loader.active{opacity:1;visibility:visible}

.loader-content{text-align:center}

.spinner{
  width:60px;height:60px;
  border:2px solid rgba(255,255,255,.2);
  border-top:2px solid #fff;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:0 auto 20px;
}
@keyframes spin{to{transform:rotate(360deg)}}

.loading-text{font-size:18px}
.loading-sub{font-size:12px;opacity:.6;margin-top:10px}

.loading-bar{
  width:260px;height:2px;
  background:rgba(255,255,255,.15);
  margin:20px auto 0;
}
.loading-fill{height:100%;width:0%;background:#fff}

/* ===== ZOOM ===== */
.zoom-out{
  transform:scale(1.25);
  filter:blur(25px) brightness(0);
  transition:1s cubic-bezier(.2,.8,.2,1);
}

/* ===== FADE ===== */
.page-fade{
  position:fixed;
  inset:0;
  background:#000;
  opacity:0;
  pointer-events:none;
  transition:1.2s ease;
  z-index:20000;
}
.page-fade.active{opacity:1}

/* ===== STAGE ===== */
.stage{
  position:fixed;
  inset:0;
  perspective:1200px;
  overflow:hidden;
}

/* ===== BACKGROUND IMAGE (INITIAL) ===== */
.bg-fallback{
  position:absolute;
  inset:0;
  background:url('https://images.unsplash.com/photo-1496307653780-42ee777d4833?auto=format&fit=crop&w=1920&q=80')
  center/cover no-repeat;
  filter:blur(2px) brightness(.55);
  transform:scale(1.2);
  z-index:0;
}

/* ===== VIDEO OVERLAY ===== */
.bg-video{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  filter:blur(10px) brightness(.5);
  transform:scale(1.1);
  z-index:1;
  opacity:0;
  transition:opacity 1.5s ease;
}

.overlay{
  position:absolute;
  inset:0;
  background:radial-gradient(circle, rgba(0,0,0,.2), rgba(0,0,0,.92));
  z-index:2;
}

/* ===== SCENE ===== */
.scene{
  position:absolute;
  inset:0;
  transform-style:preserve-3d;
  transition:transform .08s linear;
  z-index:3;
}

/* ===== HERO ===== */
.hero{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.title{
  font-family:'Playfair Display',serif;
  font-size:64px;
  transform:translateZ(140px);
}

.subtitle{
  margin-top:10px;
  max-width:520px;
  color:rgba(255,255,255,.7);
  transform:translateZ(90px);
}

.cta{
  margin-top:40px;
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  justify-content:center;
  transform:translateZ(180px);
}

.btn{
  padding:14px 22px;
  border-radius:50px;
  border:1px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.05);
  backdrop-filter:blur(14px);
  color:#fff;
  text-decoration:none;
  cursor:pointer;
  transition:.3s;
}
.btn:hover{transform:scale(1.08);background:rgba(255,255,255,.15)}

/* ===== PARTICLES ===== */
.particles{position:absolute;inset:2;pointer-events:none}
.particles span{
  position:absolute;
  width:3px;height:3px;
  background:rgba(255,255,255,.4);
  border-radius:50%;
  animation:float 12s linear infinite;
}
@keyframes float{
  from{transform:translateY(100vh);opacity:0}
  10%{opacity:1}
  to{transform:translateY(-10vh);opacity:0}
}

/* ===== MODAL ===== */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  backdrop-filter:blur(15px);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:30000;
}
.modal.active{display:flex}

.modal-box{
  width:90%;
  max-width:420px;
  padding:30px;
  border-radius:20px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.15);
  backdrop-filter:blur(20px);
}

.modal-box h2{
  font-family:'Playfair Display';
  margin-bottom:15px;
}

.modal-box input,
.modal-box textarea{
  width:100%;
  margin:8px 0;
  padding:10px;
  border-radius:10px;
  border:none;
  outline:none;
  background:rgba(255,255,255,.08);
  color:#fff;
}

.modal-box textarea{height:80px;resize:none}

.modal-actions{
  display:flex;
  justify-content:space-between;
  margin-top:15px;
}

.close{cursor:pointer;opacity:.7}
</style>
</head>

<body>

<!-- LOADER -->
<div class="loader" id="loader">
  <div>Loading Experience</div>
  <div class="bar"><div class="fill" id="fill"></div></div>
</div>

<!-- TOUR LOADER -->
<div class="tour-loader" id="tourLoader">
  <div class="loader-content">
    <div class="spinner"></div>
    <div class="loading-text">Tour loading </div>
    <div class="loading-bar"><div class="loading-fill" id="tourFill"></div></div>
    <div class="loading-sub">Preparing environment...</div>
  </div>
</div>

<div class="page-fade" id="pageFade"></div>

<div class="stage">

<!-- BACKGROUND -->
<div class="bg-fallback"></div>

<video class="bg-video" autoplay muted loop playsinline oncanplay="this.style.opacity='1'">
  <source src="https://cdn.coverr.co/videos/coverr-night-city-lights-6430/1080p.mp4">
</video>

<div class="overlay"></div>

<div class="particles" id="particles"></div>

<div class="scene" id="scene">

  <div class="hero">
    <div class="title">Phraimz Concepts</div>
    <div class="subtitle"> Experience projects before they exist.</div>

    <div class="cta">
      <a class="btn" onclick="enterTour()">ENTER TOUR</a>
      <a class="btn" onclick="openModal()">BOOK CONSULTATION</a>
      <a class="btn" href="https://wa.me/2347066456141">WHATSAPP</a>
      <a class="btn" href="mailto:ephraimikwueze@yahoo.com">EMAIL</a>
    </div>

  </div>

</div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h2>Book Consultation</h2>

    <input type="text" placeholder="Full Name">
    <input type="email" placeholder="Email Address">
    <textarea placeholder="Tell us about your project"></textarea>

    <div class="modal-actions">
      <div class="btn" onclick="submitForm()">Send</div>
      <div class="close" onclick="closeModal()">Close</div>
    </div>
  </div>
</div>

<script>

/* loader */
let p=0;
setInterval(()=>{
  p+=Math.random()*8;
  if(p>100)p=100;
  document.getElementById('fill').style.width=p+"%";
  if(p===100)document.getElementById('loader').classList.add('hidden');
},70);

/* particles */
const particles=document.getElementById('particles');
for(let i=0;i<30;i++){
  const s=document.createElement('span');
  s.style.left=Math.random()*100+"%";
  s.style.animationDuration=(6+Math.random()*10)+"s";
  particles.appendChild(s);
}

/* camera */
let cx=0,cy=0,tx=0,ty=0;
function animate(){
  cx+=(tx-cx)*0.07;
  cy+=(ty-cy)*0.07;
  scene.style.transform=`rotateY(${cx}deg) rotateX(${-cy}deg)`;
  requestAnimationFrame(animate);
}
animate();

document.addEventListener('mousemove',(e)=>{
  tx=(e.clientX/window.innerWidth-0.5)*20;
  ty=(e.clientY/window.innerHeight-0.5)*20;
});

/* gyro */
let base=false,gx=0,gy=0;
function handleGyro(e){
  if(!base){gx=e.gamma||0;gy=e.beta||0;base=true}
  tx=((e.gamma||0)-gx)/3*12;
  ty=((e.beta||0)-gy)/3*12;
}
function enableGyro(){
  if(DeviceOrientationEvent?.requestPermission){
    DeviceOrientationEvent.requestPermission().then(r=>{
      if(r==="granted")window.addEventListener("deviceorientation",handleGyro);
    });
  } else window.addEventListener("deviceorientation",handleGyro);
}
document.addEventListener("touchstart",enableGyro,{once:true});
document.addEventListener("click",enableGyro,{once:true});

/* ENTER TOUR */
function enterTour(){
  const tour=document.getElementById('tourLoader');
  const fill=document.getElementById('tourFill');
  const fade=document.getElementById('pageFade');

  tour.classList.add('active');

  let p=0;
  const i=setInterval(()=>{
    p+=Math.random()*10;
    if(p>=100)p=100;
    fill.style.width=p+"%";

    if(p===100){
      clearInterval(i);
      scene.classList.add('zoom-out');
      setTimeout(()=>fade.classList.add('active'),600);
      setTimeout(()=>window.location.href="tour.html",1600);
    }
  },80);
}

/* MODAL */
function openModal(){document.getElementById('modal').classList.add('active')}
function closeModal(){document.getElementById('modal').classList.remove('active')}
function submitForm(){
  alert("Consultation request sent!");
  closeModal();
}

</script>

</body>
</html>
