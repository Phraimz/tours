<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Luxury Virtual Tour</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
background:
linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
url('preview.jpg') center/cover no-repeat;
color:white;
}

.box{
max-width:800px;
padding:30px;
}

h1{
font-size:60px;
margin-bottom:20px;
}

p{
font-size:20px;
margin-bottom:30px;
line-height:1.6;
}

button{
padding:18px 40px;
font-size:18px;
border:none;
border-radius:50px;
background:gold;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}
</style>
</head>

<body>

<div class="box">
<h1>Luxury Virtual Tour</h1>

<button onclick="window.location.href='index.html'">
