<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phraimz Concepts | Immersive Tours</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #000;
      color: #fff;
      overflow: hidden;
    }

    /* LOADER */
    .loader {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 1s ease, visibility 1s ease;
    }

    .loader.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .loader-title {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      letter-spacing: 3px;
      margin-bottom: 18px;
      animation: pulse 1.4s infinite;
    }

    .loader-percent {
      font-size: 14px;
      letter-spacing: 2px;
      margin-bottom: 20px;
      opacity: 0.8;
    }

    .loader-bar {
      width: 220px;
      height: 2px;
      background: rgba(255,255,255,0.15);
      position: relative;
      overflow: hidden;
      border-radius: 2px;
    }

    .loader-bar-fill {
      height: 100%;
      width: 0%;
      background: white;
      transition: width 0.2s linear;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    /* TOUR MINI LOADER */
    .tour-loader {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10000;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.4s ease;
    }

    .tour-loader.active {
      opacity: 1;
      visibility: visible;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top: 2px solid white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* CINEMATIC BACKGROUND */
    .bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('https://images.unsplash.com/photo-1496307653780-42ee777d4833?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
      filter: blur(16px) brightness(0.5);
      transform: scale(1.15);
      transition: filter 1.5s ease, transform 1.5s ease;
    }

    body.loaded .bg {
      filter: blur(8px) brightness(0.6);
      transform: scale(1.08);
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, rgba(0,0,0,0.25), rgba(0,0,0,0.92));
    }

    /* HERO */
    .hero {
      position: relative;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      z-index: 2;
      padding: 20px;
      opacity: 0;
      transform: scale(1.05);
      transition: opacity 1.2s ease, transform 1.2s ease;
    }

    body.loaded .hero {
      opacity: 1;
      transform: scale(1);
    }

    .title {
      font-family: 'Playfair Display', serif;
      font-size: 64px;
      margin-bottom: 20px;
      transition: transform 0.2s ease;
    }

    .subtitle {
      font-size: 16px;
      max-width: 520px;
      color: rgba(255,255,255,0.7);
      transition: transform 0.2s ease;
    }

    /* CTA */
    .cta-group {
      margin-top: 40px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      padding: 14px 22px;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.05);
      color: #fff;
      font-size: 13px;
      letter-spacing: 1.5px;
      cursor: pointer;
      transition: 0.3s ease;
      backdrop-filter: blur(10px);
      text-decoration: none;
    }

    .btn:hover {
      transform: scale(1.05);
      background: rgba(255,255,255,0.15);
    }

    .btn.primary {
      background: rgba(255,255,255,0.18);
    }

    /* TRANSITION */
    .transition {
      position: fixed;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: white;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      z-index: 10;
      transition: transform 1.2s ease;
    }

    .transition.active {
      transform: translate(-50%, -50%) scale(50);
    }
  </style>
</head>
<body>

  <!-- LOADER -->
  <div class="loader" id="loader">
    <div class="loader-title">Loading Experience</div>
    <div class="loader-percent" id="percent">0%</div>
    <div class="loader-bar">
      <div class="loader-bar-fill" id="bar"></div>
    </div>
  </div>

  <!-- MINI TOUR LOADER -->
  <div class="tour-loader" id="tourLoader">
    <div class="spinner"></div>
    <div>Loading Tour...</div>
  </div>

  <div class="bg" id="bg"></div>
  <div class="overlay" id="overlay"></div>

  <div class="hero">
    <h1 class="title" id="title">Phraimz Concepts</h1>
    <p class="subtitle" id="subtitle">
      Experience architectural spaces before they exist.
    </p>

    <div class="cta-group">
      <button class="btn primary" onclick="enterTour()">ENTER TOUR</button>
      <a class="btn" href="https://wa.me/2347066456141" target="_blank">WHATSAPP</a>
      <a class="btn" href="#" onclick="bookConsultation()">BOOK CONSULTATION</a>
      <a class="btn" href="mailto:contact@ephraimikwueze@yahoo.com">EMAIL US</a>
    </div>
  </div>

  <div class="transition" id="transition"></div>

  <script>
    let progress = 0;
    const bar = document.getElementById('bar');
    const percent = document.getElementById('percent');
    const loader = document.getElementById('loader');

    const interval = setInterval(() => {
      progress += Math.floor(Math.random() * 8) + 2;
      if (progress >= 100) progress = 100;

      bar.style.width = progress + "%";
      percent.innerText = progress + "%";

      if (progress === 100) {
        clearInterval(interval);
        setTimeout(() => {
          loader.classList.add('hidden');
          document.body.classList.add('loaded');
        }, 500);
      }
    }, 120);

    function enterTour() {
      const tourLoader = document.getElementById('tourLoader');
      tourLoader.classList.add('active');

      setTimeout(() => {
        const t = document.getElementById('transition');
        t.classList.add('active');
      }, 600);

      setTimeout(() => {
        window.location.href = "tour.html";
      }, 1500);
    }

    function bookConsultation() {
      alert("Booking system coming soon. Use WhatsApp for now.");
    }

    document.addEventListener('mousemove', (e) => {
      const x = (e.clientX / window.innerWidth) - 0.5;
      const y = (e.clientY / window.innerHeight) - 0.5;

      document.getElementById('bg').style.transform = `translate(${x*20}px,${y*20}px) scale(1.15)`;
      document.getElementById('overlay').style.transform = `translate(${x*10}px,${y*10}px)`;
      document.getElementById('title').style.transform = `translate(${x*15}px,${y*15}px)`;
      document.getElementById('subtitle').style.transform = `translate(${x*10}px,${y*10}px)`;
    });
  </script>

</body>
</html>
