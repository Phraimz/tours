<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phraimz Concepts | Immersive Tours</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      touch-action: none;
      background: #000;
      font-family: 'Inter', sans-serif;
      color: #fff;
    }

    /* GPU OPTIMIZATION */
    #bg, #overlay, #title, #subtitle {
      will-change: transform;
    }

    /* LOADER */
    .loader {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 1s ease, visibility 1s ease;
    }

    .loader.hidden { opacity: 0; visibility: hidden; }

    .loader-title {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      margin-bottom: 18px;
      animation: pulse 1.4s infinite;
    }

    .loader-percent {
      font-size: 14px;
      opacity: 0.8;
      margin-bottom: 20px;
    }

    .loader-bar {
      width: 220px;
      height: 2px;
      background: rgba(255,255,255,0.15);
      overflow: hidden;
    }

    .loader-bar-fill {
      height: 100%;
      width: 0%;
      background: #fff;
    }

    @keyframes pulse {
      0%,100%{opacity:0.5;}50%{opacity:1;}
    }

    /* TOUR LOADER */
    .tour-loader {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10000;
      opacity: 0;
      visibility: hidden;
      transition: 0.4s ease;
    }

    .tour-loader.active { opacity: 1; visibility: visible; }

    .spinner {
      width: 40px;
      height: 40px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top: 2px solid #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 10px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* BACKGROUND */
    .bg {
      position: fixed;
      inset: 0;
      background: url('https://images.unsplash.com/photo-1496307653780-42ee777d4833?auto=format&fit=crop&w=1920&q=80')
      center/cover no-repeat;
      filter: blur(16px) brightness(0.5);
      transform: scale(1.15);
      transition: 1.5s ease;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle, rgba(0,0,0,0.2), rgba(0,0,0,0.92));
    }

    /* HERO */
    .hero {
      position: relative;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      z-index: 2;
      padding: 20px;
      opacity: 0;
      transform: scale(1.05);
      transition: 1s ease;
    }

    body.loaded .hero {
      opacity: 1;
      transform: scale(1);
    }

    .title {
      font-family: 'Playfair Display', serif;
      font-size: 64px;
      margin-bottom: 20px;
    }

    .subtitle {
      font-size: 16px;
      max-width: 520px;
      color: rgba(255,255,255,0.7);
    }

    /* BUTTONS */
    .cta-group {
      margin-top: 40px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      padding: 14px 22px;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.05);
      color: #fff;
      font-size: 13px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
      background: rgba(255,255,255,0.15);
    }

    .btn.primary { background: rgba(255,255,255,0.18); }

    /* TRANSITION */
    .transition {
      position: fixed;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: white;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      z-index: 10;
      transition: 1.2s ease;
    }

    .transition.active {
      transform: translate(-50%, -50%) scale(50);
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .title { font-size: 38px; }
      .bg { filter: blur(10px) brightness(0.55); }
    }
  </style>
</head>

<body>

  <!-- LOADER -->
  <div class="loader" id="loader">
    <div class="loader-title">Loading Experience</div>
    <div class="loader-percent" id="percent">0%</div>
    <div class="loader-bar">
      <div class="loader-bar-fill" id="bar"></div>
    </div>
  </div>

  <!-- TOUR LOADER -->
  <div class="tour-loader" id="tourLoader">
    <div class="spinner"></div>
    <div>Loading Tour...</div>
  </div>

  <div class="bg" id="bg"></div>
  <div class="overlay" id="overlay"></div>

  <div class="hero">
    <h1 class="title" id="title">Phraimz Concepts</h1>
    <p class="subtitle" id="subtitle">Experience architectural spaces before they exist.</p>

    <div class="cta-group">
      <button class="btn primary" onclick="enterTour()">ENTER TOUR</button>
      <a class="btn" href="https://wa.me/2347066456141" target="_blank">WHATSAPP</a>
      <a class="btn" href="#" onclick="bookConsultation()">BOOK CONSULTATION</a>
      <a class="btn" href="mailto:ephraimikwueze@yahoo.com">EMAIL US</a>
    </div>
  </div>

  <div class="transition" id="transition"></div>

<script>
/* ================= LOADER ================= */
let progress = 0;
const bar = document.getElementById('bar');
const percent = document.getElementById('percent');
const loader = document.getElementById('loader');

const load = setInterval(() => {
  progress += Math.random() * 10;
  if (progress >= 100) progress = 100;

  bar.style.width = progress + "%";
  percent.innerText = Math.floor(progress) + "%";

  if (progress === 100) {
    clearInterval(load);
    setTimeout(() => {
      loader.classList.add('hidden');
      document.body.classList.add('loaded');
    }, 500);
  }
}, 100);

/* ================= TOUR ================= */
function enterTour() {
  document.getElementById('tourLoader').classList.add('active');

  setTimeout(() => {
    document.getElementById('transition').classList.add('active');
  }, 600);

  setTimeout(() => {
    window.location.href = "tour.html";
  }, 1500);
}

function bookConsultation() {
  alert("Use WhatsApp for now. Booking system coming soon.");
}

/* ================= PARALLAX ENGINE ================= */
function updateParallax(x, y) {
  document.getElementById('bg').style.transform =
    `translate(${x*30}px,${y*30}px) scale(1.15)`;

  document.getElementById('overlay').style.transform =
    `translate(${x*15}px,${y*15}px)`;

  document.getElementById('title').style.transform =
    `translate(${x*10}px,${y*10}px)`;

  document.getElementById('subtitle').style.transform =
    `translate(${x*6}px,${y*6}px)`;
}

/* ================= DESKTOP ================= */
document.addEventListener('mousemove', (e) => {
  const x = (e.clientX / window.innerWidth) - 0.5;
  const y = (e.clientY / window.innerHeight) - 0.5;
  updateParallax(x, y);
});

/* ================= MOBILE TOUCH ================= */
document.addEventListener('touchmove', (e) => {
  const t = e.touches[0];
  const x = (t.clientX / window.innerWidth) - 0.5;
  const y = (t.clientY / window.innerHeight) - 0.5;
  updateParallax(x, y);
}, { passive: true });

/* ================= GYROSCOPE (UPGRADED) ================= */
let baseGamma = 0;
let baseBeta = 0;
let ready = false;

let cx = 0, cy = 0;

function clamp(v, min, max) {
  return Math.max(min, Math.min(max, v));
}

function smooth(tx, ty) {
  cx += (tx - cx) * 0.08;
  cy += (ty - cy) * 0.08;
  updateParallax(cx, cy);
}

window.addEventListener('deviceorientation', (e) => {
  if (!ready) {
    baseGamma = e.gamma || 0;
    baseBeta = e.beta || 0;
    ready = true;
  }

  let x = ((e.gamma || 0) - baseGamma) / 18;
  let y = ((e.beta || 0) - baseBeta) / 18;

  x = clamp(x, -1, 1);
  y = clamp(y, -1, 1);

  smooth(x, y);
});
</script>

</body>
</html>
