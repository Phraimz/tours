<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Ephraim Tours | Luxury Virtual Experiences</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
font-family:'Poppins',sans-serif;
overflow:hidden;
background:#000;
color:#fff;
}

/* Background */
.hero-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
url('preview.jpg') center center/cover no-repeat;
transform:scale(1.08);
animation:zoomBg 12s ease-in-out infinite alternate;
z-index:-2;
}

.glow{
position:fixed;
inset:0;
background:radial-gradient(circle at top right, rgba(212,175,55,.18), transparent 35%),
radial-gradient(circle at bottom left, rgba(255,255,255,.08), transparent 30%);
z-index:-1;
}

/* Nav */
.nav{
position:fixed;
top:0;
left:0;
width:100%;
padding:24px 48px;
display:flex;
justify-content:space-between;
align-items:center;
backdrop-filter:blur(10px);
background:rgba(0,0,0,.15);
}

.logo{
font-size:24px;
font-weight:700;
letter-spacing:2px;
}

.menu{
display:flex;
gap:28px;
font-size:14px;
opacity:.9;
}

.menu span{
cursor:pointer;
transition:.3s;
}

.menu span:hover{
opacity:.65;
}

/* Hero */
.hero{
height:100%;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:30px;
}

.box{
max-width:950px;
animation:fadeUp 1.2s ease;
}

.tag{
font-size:13px;
letter-spacing:5px;
opacity:.8;
margin-bottom:18px;
}

h1{
font-size:78px;
line-height:1.03;
font-weight:700;
margin-bottom:22px;
}

p{
font-size:21px;
line-height:1.7;
opacity:.9;
max-width:760px;
margin:auto;
margin-bottom:38px;
}

/* Buttons */
.actions{
display:flex;
justify-content:center;
gap:18px;
flex-wrap:wrap;
}

.btn{
padding:18px 38px;
border:none;
border-radius:50px;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:.35s;
}

.primary{
background:linear-gradient(135deg,#d4af37,#f4e19d);
color:#000;
box-shadow:0 12px 30px rgba(212,175,55,.22);
}

.primary:hover{
transform:translateY(-4px);
}

.secondary{
background:rgba(255,255,255,.08);
color:#fff;
border:1px solid rgba(255,255,255,.15);
backdrop-filter:blur(8px);
}

.secondary:hover{
background:rgba(255,255,255,.14);
}

/* Bottom card */
.badge{
position:fixed;
right:24px;
bottom:24px;
padding:14px 18px;
border-radius:18px;
font-size:13px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(10px);
}

/* Loader */
.loader{
position:fixed;
inset:0;
background:#000;
display:flex;
justify-content:center;
align-items:center;
font-size:18px;
letter-spacing:4px;
z-index:999;
animation:hideLoader 2s forwards;
}

/* Animations */
@keyframes fadeUp{
from{opacity:0;transform:translateY(40px);}
to{opacity:1;transform:translateY(0);}
}

@keyframes zoomBg{
from{transform:scale(1.05);}
to{transform:scale(1.12);}
}

@keyframes hideLoader{
0%,70%{opacity:1;visibility:visible;}
100%{opacity:0;visibility:hidden;}
}

/* Mobile */
@media(max-width:768px){

.nav{
padding:18px 22px;
}

.menu{
display:none;
}

h1{
font-size:44px;
}

p{
font-size:16px;
}

.btn{
width:100%;
}

.actions{
flex-direction:column;
}
}
</style>
</head>

<body>

<div class="loader">LOADING EXPERIENCE...</div>

<div class="hero-bg"></div>
<div class="glow"></div>

<nav class="nav">
<div class="logo">EPHRAIM TOURS</div>
<div class="menu">
<span>Home</span>
<span>Projects</span>
<span>Pricing</span>
<span>Contact</span>
</div>
</nav>

<section class="hero">
<div class="box">
<div class="tag">PREMIUM IMMERSIVE EXPERIENCES</div>

<h1>Luxury Spaces.<br>Digitally Reimagined.</h1>

<p>
Showcase homes, estates, hotels and commercial spaces with cinematic 360° virtual tours that impress clients instantly.
</p>

<div class="actions">
<button class="btn primary" onclick="window.location.href='tour.html'">
Enter Tour
</button>

<button class="btn secondary" onclick="window.location.href='https://wa.me/'">
Book Demo
</button>
</div>
</div>
</section>

<div class="badge">360° Tours • Drone • Branding</div>

</body>
</html>
