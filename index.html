<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phraimz Concepts | Immersive Tours</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #000;
      color: #fff;
      overflow: hidden;
    }

    /* Cinematic background */
    .bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('https://images.unsplash.com/photo-1496307653780-42ee777d4833?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
      filter: blur(10px) brightness(0.5);
      transform: scale(1.1);
      transition: transform 0.2s ease;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, rgba(0,0,0,0.3), rgba(0,0,0,0.9));
      transition: transform 0.2s ease;
    }

    /* Hero */
    .hero {
      position: relative;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      z-index: 2;
      padding: 20px;
    }

    .title {
      font-family: 'Playfair Display', serif;
      font-size: 64px;
      letter-spacing: 1px;
      margin-bottom: 20px;
      opacity: 0;
      animation: fadeUp 1.5s forwards;
      transition: transform 0.2s ease;
    }

    .subtitle {
      font-size: 16px;
      max-width: 520px;
      opacity: 0;
      color: rgba(255,255,255,0.7);
      animation: fadeUp 1.5s 0.3s forwards;
      transition: transform 0.2s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* CTA buttons */
    .cta-group {
      margin-top: 40px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      padding: 14px 22px;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.05);
      color: #fff;
      font-size: 13px;
      letter-spacing: 1.5px;
      cursor: pointer;
      transition: all 0.35s ease;
      backdrop-filter: blur(10px);
      text-decoration: none;
      display: inline-block;
    }

    .btn:hover {
      transform: scale(1.05);
      background: rgba(255,255,255,0.15);
    }

    .btn.primary {
      background: rgba(255,255,255,0.18);
    }

    /* Transition effect */
    .transition {
      position: fixed;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: white;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      z-index: 10;
      transition: transform 1.2s ease;
    }

    .transition.active {
      transform: translate(-50%, -50%) scale(50);
    }
  </style>
</head>
<body>

  <div class="bg" id="bg"></div>
  <div class="overlay" id="overlay"></div>

  <div class="hero">
    <h1 class="title" id="title">Phraimz Concepts</h1>
    <p class="subtitle" id="subtitle">
      Experience architectural spaces before they exist.
    </p>

    <div class="cta-group">
      <button class="btn primary" onclick="enterTour()">ENTER TOUR</button>
      <a class="btn" href="https://wa.me/2347066456141" target="_blank">WHATSAPP</a>
      <a class="btn" href="#" onclick="bookConsultation()">BOOK CONSULTATION</a>
      <a class="btn" href="mailto:contact@ephraimikwueze@yahoo.com">EMAIL US</a>
    </div>
  </div>

  <div class="transition" id="transition"></div>

  <script>
    function enterTour() {
      const t = document.getElementById('transition');
      t.classList.add('active');

      setTimeout(() => {
        window.location.href = "tour.html";
      }, 1200);
    }

    function bookConsultation() {
      alert("Booking system coming soon. You can connect via WhatsApp for now.");
    }

    // Mouse parallax system
    document.addEventListener('mousemove', (e) => {
      const x = (e.clientX / window.innerWidth) - 0.5;
      const y = (e.clientY / window.innerHeight) - 0.5;

      const bg = document.getElementById('bg');
      const overlay = document.getElementById('overlay');
      const title = document.getElementById('title');
      const subtitle = document.getElementById('subtitle');

      bg.style.transform = `translate(${x * 20}px, ${y * 20}px) scale(1.1)`;
      overlay.style.transform = `translate(${x * 10}px, ${y * 10}px)`;

      title.style.transform = `translate(${x * 15}px, ${y * 15}px)`;
      subtitle.style.transform = `translate(${x * 10}px, ${y * 10}px)`;
    });
  </script>

</body>
</html>
