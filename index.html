<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Phraimz Concepts | Spatial 3D</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

html,body{
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:'Inter',sans-serif;
  color:#fff;
}

/* ===== LOADER ===== */
.loader{
  position:fixed;inset:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
  transition:.8s;
}
.loader.hidden{opacity:0;visibility:hidden}
.bar{width:240px;height:2px;background:rgba(255,255,255,.15);margin-top:20px}
.fill{height:100%;width:0%;background:#fff}

/* ===== TOUR LOADER ===== */
.tour-loader{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.92);
  backdrop-filter:blur(20px);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10000;
  opacity:0;
  visibility:hidden;
  transition:.5s ease;
}
.tour-loader.active{opacity:1;visibility:visible}

.loader-content{text-align:center}

.spinner{
  width:60px;height:60px;
  border:2px solid rgba(255,255,255,.2);
  border-top:2px solid #fff;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:0 auto 20px;
}
@keyframes spin{to{transform:rotate(360deg)}}

.loading-text{font-size:18px}
.loading-sub{font-size:12px;opacity:.6;margin-top:10px}

.loading-bar{
  width:260px;height:2px;
  background:rgba(255,255,255,.15);
  margin:20px auto 0;
  overflow:hidden;
}
.loading-fill{height:100%;width:0%;background:#fff}

/* ===== ZOOM ===== */
.zoom-out{
  transform:scale(1.25);
  filter:blur(25px) brightness(0);
  transition:1s cubic-bezier(.2,.8,.2,1);
}

/* ===== FADE ===== */
.page-fade{
  position:fixed;
  inset:0;
  background:#000;
  opacity:0;
  pointer-events:none;
  transition:1.2s ease;
  z-index:20000;
}
.page-fade.active{opacity:1}

/* ===== STAGE ===== */
.stage{
  position:fixed;
  inset:0;
  perspective:1200px;
  overflow:hidden;
}

/* background */
.bg-video{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  filter:blur(10px) brightness(.5);
  transform:scale(1.1);
}

.bg-fallback{
  position:absolute;
  inset:-10%;
  background:url('https://images.unsplash.com/photo-1496307653780-42ee777d4833?auto=format&fit=crop&w=1920&q=80')
  center/cover no-repeat;
  filter:blur(12px) brightness(.55);
  transform:scale(1.2);
}

.overlay{
  position:absolute;
  inset:0;
  background:radial-gradient(circle, rgba(0,0,0,.2), rgba(0,0,0,.92));
}

/* ===== SCENE ===== */
.scene{
  position:absolute;
  inset:0;
  transform-style:preserve-3d;
  transition:transform .08s linear;
}

/* ===== HERO ===== */
.hero{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.title{
  font-family:'Playfair Display',serif;
  font-size:64px;
  transform:translateZ(140px);
}

.subtitle{
  margin-top:10px;
  max-width:520px;
  color:rgba(255,255,255,.7);
  transform:translateZ(90px);
}

.cta{
  margin-top:40px;
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  justify-content:center;
  transform:translateZ(180px);
}

.btn{
  padding:14px 22px;
  border-radius:50px;
  border:1px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.05);
  backdrop-filter:blur(14px);
  color:#fff;
  text-decoration:none;
  cursor:pointer;
  transition:.3s;
}
.btn:hover{
  transform:scale(1.08);
  background:rgba(255,255,255,.15);
}

/* particles */
.particles{
  position:absolute;
  inset:0;
  pointer-events:none;
}
.particles span{
  position:absolute;
  width:2px;height:2px;
  background:rgba(255,255,255,.4);
  border-radius:50%;
  animation:float 12s linear infinite;
}
@keyframes float{
  from{transform:translateY(100vh);opacity:0}
  10%{opacity:1}
  to{transform:translateY(-10vh);opacity:0}
}
</style>
</head>

<body>

<!-- LOADER -->
<div class="loader" id="loader">
  <div>Loading Experience</div>
  <div class="bar"><div class="fill" id="fill"></div></div>
</div>

<!-- TOUR LOADER -->
<div class="tour-loader" id="tourLoader">
  <div class="loader-content">
    <div class="spinner"></div>
    <div class="loading-text">Loading Virtual Tour</div>
    <div class="loading-bar">
      <div class="loading-fill" id="tourFill"></div>
    </div>
    <div class="loading-sub">Preparing environment...</div>
  </div>
</div>

<!-- FADE -->
<div class="page-fade" id="pageFade"></div>

<div class="stage">

  <video class="bg-video" autoplay muted loop playsinline>
    <source src="https://cdn.coverr.co/videos/coverr-night-city-lights-6430/1080p.mp4">
  </video>

  <div class="bg-fallback"></div>
  <div class="overlay"></div>

  <div class="particles" id="particles"></div>

  <div class="scene" id="scene">

    <div class="hero">
      <div class="title">Phraimz Concepts</div>
      <div class="subtitle">Enter a spatial architectural experience.</div>

      <div class="cta">
        <a class="btn" onclick="enterTour()">ENTER TOUR</a>
        <a class="btn" href="https://wa.me/2347066456141">WHATSAPP</a>
        <a class="btn" href="mailto:ephraimikwueze@yahoo.com">EMAIL</a>
      </div>

    </div>

  </div>
</div>

<script>

/* ===== LOADER ===== */
let p=0;
setInterval(()=>{
  p+=Math.random()*8;
  if(p>100)p=100;
  document.getElementById('fill').style.width=p+"%";
  if(p===100)document.getElementById('loader').classList.add('hidden');
},70);

/* ===== PARTICLES ===== */
const particles=document.getElementById('particles');
for(let i=0;i<30;i++){
  const s=document.createElement('span');
  s.style.left=Math.random()*100+"%";
  s.style.animationDuration=(6+Math.random()*10)+"s";
  particles.appendChild(s);
}

/* ===== CAMERA ===== */
let cx=0,cy=0,tx=0,ty=0;

function animate(){
  cx+=(tx-cx)*0.07;
  cy+=(ty-cy)*0.07;
  scene.style.transform=`rotateY(${cx}deg) rotateX(${-cy}deg)`;
  requestAnimationFrame(animate);
}
animate();

document.addEventListener('mousemove',(e)=>{
  tx=(e.clientX/window.innerWidth-0.5)*20;
  ty=(e.clientY/window.innerHeight-0.5)*20;
});

/* ===== GYROSCOPE FIX (FULL SUPPORT) ===== */
let base=false,gx=0,gy=0;

function handleGyro(e){
  if(!base){
    gx=e.gamma||0;
    gy=e.beta||0;
    base=true;
  }

  const x=((e.gamma||0)-gx)/3;
  const y=((e.beta||0)-gy)/3;

  tx=x*12;
  ty=y*12;
}

function enableGyro(){
  if(typeof DeviceOrientationEvent !== "undefined" &&
     typeof DeviceOrientationEvent.requestPermission === "function"){

    DeviceOrientationEvent.requestPermission()
      .then(res=>{
        if(res==="granted"){
          window.addEventListener("deviceorientation",handleGyro);
        }
      });

  } else {
    window.addEventListener("deviceorientation",handleGyro);
  }
}

document.addEventListener("touchstart",enableGyro,{once:true});
document.addEventListener("click",enableGyro,{once:true});

/* ===== ENTER TOUR ===== */
function enterTour(){
  const tour=document.getElementById('tourLoader');
  const fill=document.getElementById('tourFill');
  const fade=document.getElementById('pageFade');

  tour.classList.add('active');

  let p=0;

  const i=setInterval(()=>{
    p+=Math.random()*10;
    if(p>=100)p=100;

    fill.style.width=p+"%";

    if(p===100){
      clearInterval(i);

      scene.classList.add('zoom-out');

      setTimeout(()=>fade.classList.add('active'),600);

      setTimeout(()=>{
        window.location.href="tour.html";
      },1600);
    }
  },80);
}

</script>

</body>
</html>
